<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter Erlangen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#fff;overflow:hidden;}
#app{width:1920px;height:1080px;display:grid;grid-template-columns:420px 1fr;transform-origin:top left;}

/* WETTER PANEL */
.weather-panel{
  background:linear-gradient(160deg,#0d1b3e 0%,#0a2a5c 60%,#0d3a7a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 30px;border-right:1px solid rgba(255,255,255,0.1);position:relative;
}
.weather-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(30,80,180,0.3) 0%,transparent 70%);
}
.city-name{font-size:26px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:6px;position:relative;z-index:1;}
.weather-icon-big{font-size:110px;margin:16px 0;position:relative;z-index:1;filter:drop-shadow(0 0 20px rgba(100,180,255,0.4));}
.temp-main{font-size:88px;font-weight:300;line-height:1;position:relative;z-index:1;color:#fff;}
.temp-unit{font-size:38px;vertical-align:top;margin-top:10px;display:inline-block;color:rgba(255,255,255,0.6);}
.weather-desc{font-size:20px;color:rgba(255,255,255,0.75);margin-top:8px;position:relative;z-index:1;text-transform:capitalize;}
.weather-details{display:flex;gap:20px;margin-top:20px;position:relative;z-index:1;}
.detail-item{text-align:center;}
.detail-label{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:1px;}
.detail-val{font-size:17px;color:rgba(255,255,255,0.85);font-weight:500;margin-top:2px;}
.update-time{font-size:11px;color:rgba(255,255,255,0.3);position:absolute;bottom:16px;z-index:1;}
.date-display{font-size:16px;color:rgba(255,255,255,0.55);margin-bottom:4px;position:relative;z-index:1;letter-spacing:1px;}

/* FORECAST */
.forecast-section{
  background:#080818;display:grid;grid-template-rows:1fr 1fr;
}
.forecast-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.05);}
.forecast-card{
  background:#0c0c22;padding:22px 20px;display:flex;flex-direction:column;justify-content:space-between;
  transition:background 0.3s;
}
.forecast-card:hover{background:#10102a;}
.fc-day{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px;}
.fc-icon{font-size:52px;margin:6px 0;filter:drop-shadow(0 2px 8px rgba(100,180,255,0.3));}
.fc-desc{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:10px;min-height:20px;}
.fc-temp{font-size:28px;font-weight:300;color:#fff;margin-bottom:6px;}
.fc-temp span{font-size:14px;color:rgba(255,255,255,0.45);}
.fc-bars{display:flex;flex-direction:column;gap:5px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:10px;color:rgba(255,255,255,0.35);width:16px;text-align:center;}
.bar-track{flex:1;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.bar-rain .bar-fill{background:linear-gradient(90deg,#3b82f6,#60a5fa);}
.bar-wind .bar-fill{background:linear-gradient(90deg,#8b5cf6,#a78bfa);}
.bar-hum  .bar-fill{background:linear-gradient(90deg,#06b6d4,#67e8f9);}
.bar-val{font-size:10px;color:rgba(255,255,255,0.4);width:36px;text-align:right;}

/* ERROR */
.error-msg{display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,100,100,0.7);font-size:18px;}
</style>
</head>
<body>
<div id="app">
  <div class="weather-panel">
    <div class="city-name">Erlangen</div>
    <div class="date-display" id="dateDisp">–</div>
    <div class="weather-icon-big" id="mainIcon">⏳</div>
    <div class="temp-main" id="tempMain">–<span class="temp-unit">°C</span></div>
    <div class="weather-desc" id="mainDesc">Lade Daten…</div>
    <div class="weather-details">
      <div class="detail-item"><div class="detail-label">Regen</div><div class="detail-val" id="mainRain">–</div></div>
      <div class="detail-item"><div class="detail-label">Wind</div><div class="detail-val" id="mainWind">–</div></div>
      <div class="detail-item"><div class="detail-label">Feuchte</div><div class="detail-val" id="mainHum">–</div></div>
    </div>
    <div class="update-time" id="updateTime"></div>
  </div>
  <div class="forecast-section">
    <div class="forecast-row" id="row1"></div>
    <div class="forecast-row" id="row2"></div>
  </div>
</div>

<script>
var DAYS=['SONNTAG','MONTAG','DIENSTAG','MITTWOCH','DONNERSTAG','FREITAG','SAMSTAG'];
var MONTHS=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

var ICONS={
  '113':'☀️','116':'⛅','119':'☁️','122':'☁️',
  '143':'🌫️','176':'🌦️','179':'🌨️','182':'🌧️','185':'🌧️',
  '200':'⛈️','227':'🌨️','230':'❄️','248':'🌫️','260':'🌫️',
  '263':'🌦️','266':'🌧️','281':'🌧️','284':'🌧️','293':'🌦️',
  '296':'🌧️','299':'🌧️','302':'🌧️','305':'🌧️','308':'🌧️',
  '311':'🌧️','314':'🌧️','317':'🌧️','320':'🌨️','323':'🌨️',
  '326':'🌨️','329':'❄️','332':'❄️','335':'❄️','338':'❄️',
  '350':'🌧️','353':'🌦️','356':'🌧️','359':'🌧️','362':'🌧️',
  '365':'🌧️','368':'🌨️','371':'❄️','374':'🌧️','377':'🌧️',
  '386':'⛈️','389':'⛈️','392':'⛈️','395':'⛈️'
};

function icon(code){ return ICONS[String(code)]||'🌡️'; }

function s(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }

function bar(pct,cls){
  return '<div class="bar-row bar-'+cls+'"><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(pct,100)+'%"></div></div><div class="bar-val">'+pct+'%</div></div>';
}

function buildCard(day,hourly,maxC,minC){
  var rain=parseInt(hourly.chanceofrain)||0;
  var wind=parseInt(hourly.windspeedKmph)||0;
  var hum=parseInt(hourly.humidity)||0;
  return '<div class="forecast-card">'
    +'<div class="fc-day">'+day+'</div>'
    +'<div class="fc-icon">'+icon(hourly.weatherCode)+'</div>'
    +'<div class="fc-desc">'+hourly.weatherDesc[0].value+'</div>'
    +'<div class="fc-temp">'+maxC+'°<span> / '+minC+'°</span></div>'
    +'<div class="fc-bars">'
    +'<div class="bar-row bar-rain"><div class="bar-label">💧</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(rain,100)+'%"></div></div><div class="bar-val">'+rain+'%</div></div>'
    +'<div class="bar-row bar-wind"><div class="bar-label">💨</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(wind,100)+'%"></div></div><div class="bar-val">'+wind+'</div></div>'
    +'<div class="bar-row bar-hum"><div class="bar-label">🌊</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(hum,100)+'%"></div></div><div class="bar-val">'+hum+'%</div></div>'
    +'</div></div>';
}

function render(data){
  try{
    var cur=data.current_condition[0];
    var now=new Date();
    s('dateDisp', DAYS[now.getDay()]+' · '+now.getDate()+'. '+MONTHS[now.getMonth()]);
    document.getElementById('mainIcon').textContent=icon(cur.weatherCode);
    s('tempMain', cur.temp_C);
    document.getElementById('tempMain').innerHTML=cur.temp_C+'<span class="temp-unit">°C</span>';
    s('mainDesc', cur.weatherDesc[0].value);
    s('mainRain', (parseInt(cur.precipMM)||0)+' mm');
    s('mainWind', cur.windspeedKmph+' km/h');
    s('mainHum',  cur.humidity+'%');

    var days=data.weather;
    var row1='',row2='';
    var dayNames=[DAYS[now.getDay()],DAYS[(now.getDay()+1)%7],DAYS[(now.getDay()+2)%7]];

    // Row 1: heute + morgen + übermorgen (Mittag-Werte)
    for(var i=0;i<3;i++){
      if(!days[i]) continue;
      var hourly=days[i].hourly[4]||days[i].hourly[0]; // ~12:00
      row1+=buildCard(i===0?'HEUTE':dayNames[i], hourly, days[i].maxtempC, days[i].mintempC);
    }
    // Row 2: nächste 3 Tage (falls vorhanden, sonst Stunden-Slots)
    var extraDays=data.weather.slice(0,3);
    for(var j=0;j<3;j++){
      var d=extraDays[j];
      if(!d) continue;
      var h=d.hourly[j*2]||d.hourly[0];
      row2+=buildCard(j===0?'MORGEN':dayNames[j+1]||'–', h, d.maxtempC, d.mintempC);
    }

    document.getElementById('row1').innerHTML=row1||'<div class="error-msg">Keine Daten</div>';
    document.getElementById('row2').innerHTML=row2||'';

    var n=new Date();
    s('updateTime','Aktualisiert: '+('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2));
  }catch(e){
    document.getElementById('row1').innerHTML='<div class="error-msg">Fehler beim Verarbeiten der Daten</div>';
  }
}

function load(){
  fetch('https://eumatec-germany.de/wetter-proxy.php')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ render(data); })
    .catch(function(e){
      s('mainDesc','Verbindungsfehler – Retry in 60s');
      console.error('Wetter Fehler:',e);
    });
}

// Skalierung auf Browserfenstergröße
function scale(){
  var s=Math.min(window.innerWidth/1920, window.innerHeight/1080);
  document.getElementById('app').style.transform='scale('+s+')';
}
window.addEventListener('resize',scale);
scale();

load();
setInterval(load, 600000); // alle 10 Min
</script>
</body>
</html>
