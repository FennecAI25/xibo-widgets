<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wetter Erlangen – EGE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gruen:   #3a8c2f;
  --gruen2:  #7ab834;
  --dunkel:  #0d1a0d;
  --panel:   #0f1f0f;
  --card:    #142814;
  --border:  rgba(122,184,52,0.18);
  --text:    #f0f7e8;
  --muted:   rgba(240,247,232,0.5);
  --accent:  #7ab834;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dunkel);}

#app{
  width:1920px;height:1080px;
  display:grid;
  grid-template-rows:120px 1fr;
  transform-origin:top left;
  background:var(--dunkel);
  font-family:'Nunito',sans-serif;
}

/* ═══════════════ HEADER ═══════════════ */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 60px;
  background:linear-gradient(90deg,#0a150a 0%,#122012 40%,#0a150a 100%);
  border-bottom:3px solid var(--gruen);
  position:relative;
}
.header::after{
  content:'';position:absolute;bottom:-8px;left:60px;right:60px;
  height:1px;background:linear-gradient(90deg,transparent,var(--gruen2),transparent);
}
.header-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:64px;letter-spacing:4px;
  color:var(--text);
  text-shadow:0 0 40px rgba(122,184,52,0.4);
}
.header-title span{color:var(--gruen2);}
.header-logo{
  height:88px;width:auto;
  filter:drop-shadow(0 4px 16px rgba(58,140,47,0.5));
}

/* ═══════════════ MAIN GRID ═══════════════ */
.main{
  display:grid;
  grid-template-columns:380px 1fr;
  gap:0;
  overflow:hidden;
}

/* ═══════════════ HEUTE PANEL ═══════════════ */
.heute-panel{
  background:linear-gradient(170deg,#122012 0%,#0d1a0d 60%,#0a130a 100%);
  border-right:2px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 24px;
  position:relative;
  overflow:hidden;
}
.heute-panel::before{
  content:'';position:absolute;top:-80px;left:-80px;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(58,140,47,0.15) 0%,transparent 70%);
  pointer-events:none;
}
.heute-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;letter-spacing:6px;
  color:#ffffff;margin-bottom:4px;
}
.heute-date{
  font-size:21px;font-weight:600;
  color:#ffffff;margin-bottom:16px;letter-spacing:1px;
}
.heute-icon{font-size:130px;line-height:1;margin:8px 0;filter:drop-shadow(0 4px 24px rgba(122,184,52,0.3));}
.heute-temp{
  font-family:'Bebas Neue',sans-serif;
  font-size:110px;line-height:1;
  color:var(--text);
  text-shadow:0 0 60px rgba(122,184,52,0.25);
}
.heute-temp sup{font-size:48px;vertical-align:top;margin-top:18px;display:inline-block;color:var(--gruen2);}
.heute-desc{
  font-size:22px;font-weight:700;
  color:var(--text);margin-top:8px;letter-spacing:1px;
}
.heute-details{
  display:flex;gap:20px;margin-top:20px;
  background:rgba(122,184,52,0.07);
  border:1px solid var(--border);
  border-radius:12px;padding:14px 20px;
}
.detail-item{text-align:center;}
.detail-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gruen2);text-transform:uppercase;}
.detail-val{font-size:20px;font-weight:800;color:var(--text);margin-top:2px;}
.update-time{
  position:absolute;bottom:14px;
  font-size:12px;color:rgba(240,247,232,0.25);letter-spacing:1px;
}

/* ═══════════════ FORECAST PANEL ═══════════════ */
.forecast-panel{
  background:var(--panel);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:3px;
  padding:3px;
}
.forecast-card{
  background:var(--card);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 30px;
  position:relative;
  overflow:hidden;
  transition:background 0.3s;
}
.forecast-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gruen),transparent);
}
.fc-day{
  font-family:'Bebas Neue',sans-serif;
  font-size:48px;letter-spacing:5px;
  color:#ffffff;margin-bottom:6px;
}
.fc-date{
  font-size:22px;font-weight:600;
  color:#ffffff;margin-bottom:24px;letter-spacing:1px;
}
.fc-icon{
  font-size:100px;line-height:1;margin:8px 0;
  filter:drop-shadow(0 4px 20px rgba(122,184,52,0.25));
}
.fc-desc{
  font-size:20px;font-weight:700;
  color:var(--muted);margin:14px 0 10px;
  text-align:center;min-height:28px;
}
.fc-temps{
  display:flex;align-items:baseline;gap:16px;margin-top:8px;
}
.fc-max{
  font-family:'Bebas Neue',sans-serif;
  font-size:80px;line-height:1;
  color:var(--text);
}
.fc-max sup{font-size:34px;color:var(--gruen2);vertical-align:top;margin-top:14px;display:inline-block;}
.fc-min{
  font-family:'Bebas Neue',sans-serif;
  font-size:44px;color:var(--muted);
}
.fc-min sup{font-size:22px;color:var(--muted);vertical-align:top;margin-top:8px;display:inline-block;}
.fc-divider{width:2px;height:60px;background:var(--border);margin:0 4px;}

/* Ladeanimation */
.loading{
  display:flex;align-items:center;justify-content:center;
  height:100%;color:var(--muted);font-size:24px;letter-spacing:2px;
  font-family:'Bebas Neue',sans-serif;
}
</style>
</head>

      <div class="heute-details">
        <div class="detail-item">
          <div class="detail-label">Regen</div>
          <div class="detail-val" id="heuteRain">–</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Wind</div>
          <div class="detail-val" id="heuteWind">–</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Feuchte</div>
          <div class="detail-val" id="heuteHum">–</div>
        </div>
      </div>
      <div class="update-time" id="updateTime"></div>
    </div>

    <!-- FORECAST: 2 Tage -->
    <div class="forecast-panel" id="forecastPanel">
      <div class="loading">Lade Wetterdaten…</div>
    </div>

  </div>
</div>

<script>
var DAYS=['SONNTAG','MONTAG','DIENSTAG','MITTWOCH','DONNERSTAG','FREITAG','SAMSTAG'];
var MONTHS=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

var ICONS={
  '113':'☀️','116':'⛅','119':'☁️','122':'☁️','143':'🌫️',
  '176':'🌦️','179':'🌨️','182':'🌧️','185':'🌧️','200':'⛈️',
  '227':'🌨️','230':'❄️','248':'🌫️','260':'🌫️','263':'🌦️',
  '266':'🌧️','281':'🌧️','284':'🌧️','293':'🌦️','296':'🌧️',
  '299':'🌧️','302':'🌧️','305':'🌧️','308':'🌧️','311':'🌧️',
  '314':'🌧️','317':'🌧️','320':'🌨️','323':'🌨️','326':'🌨️',
  '329':'❄️','332':'❄️','335':'❄️','338':'❄️','350':'🌧️',
  '353':'🌦️','356':'🌧️','359':'🌧️','362':'🌧️','365':'🌧️',
  '368':'🌨️','371':'❄️','374':'🌧️','377':'🌧️','386':'⛈️',
  '389':'⛈️','392':'⛈️','395':'⛈️'
};

function icon(code){ return ICONS[String(code)]||'🌡️'; }
function s(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }

function render(data){
  try{
    var cur=data.current_condition[0];
    var now=new Date();
    var days=data.weather;

    // HEUTE
    s('heuteDate', DAYS[now.getDay()]+' · '+now.getDate()+'. '+MONTHS[now.getMonth()]);
    document.getElementById('heuteIcon').textContent=icon(cur.weatherCode);
    s('heuteTemp', cur.temp_C);
    var desc=cur.weatherDesc[0].value;
    s('heuteDesc', desc);
    s('heuteRain', (parseInt(cur.precipMM)||0)+' mm');
    s('heuteWind', cur.windspeedKmph+' km/h');
    s('heuteHum', cur.humidity+'%');
    var n=new Date();
    s('updateTime','Aktualisiert: '+('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2)+' Uhr');

    // FORECAST: Morgen + Übermorgen
    var forecastDays=[
      {label:'MORGEN',     offset:1},
      {label:'ÜBERMORGEN', offset:2}
    ];

    var html='';
    for(var i=0;i<2;i++){
      var d=days[forecastDays[i].offset];
      if(!d) continue;
      var fDate=new Date(now); fDate.setDate(now.getDate()+forecastDays[i].offset);
      var hourly=d.hourly[4]||d.hourly[0];
      var fc_desc=hourly.weatherDesc[0].value;
      html+='<div class="forecast-card">'
        +'<div class="fc-day">'+forecastDays[i].label+'</div>'
        +'<div class="fc-date">'+DAYS[fDate.getDay()]+' · '+fDate.getDate()+'. '+MONTHS[fDate.getMonth()]+'</div>'
        +'<div class="fc-icon">'+icon(hourly.weatherCode)+'</div>'
        +'<div class="fc-desc">'+fc_desc+'</div>'
        +'<div class="fc-temps">'
        +'<div class="fc-max">'+d.maxtempC+'<sup>°C</sup></div>'
        +'<div class="fc-divider"></div>'
        +'<div class="fc-min">'+d.mintempC+'<sup>°</sup></div>'
        +'</div>'
        +'</div>';
    }
    document.getElementById('forecastPanel').innerHTML=html||'<div class="loading">Keine Daten</div>';

  }catch(e){
    console.error('Render Fehler:',e);
    s('heuteDesc','Fehler beim Laden');
  }
}

function load(){
  fetch('https://eumatec-germany.de/wetter-proxy.php')
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){ render(data); })
    .catch(function(e){ s('heuteDesc','Verbindungsfehler'); console.error(e); });
}

function scale(){
  var sc=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  document.getElementById('app').style.transform='scale('+sc+')';
}
window.addEventListener('resize',scale);
scale();

load();
setInterval(load,600000);
</script>
</body>
</html>
